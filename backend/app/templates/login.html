{% extends "base.html" %}

{% block title %}Login | Medication Reminder System{% endblock %}
{% block page_id %}login{% endblock %}

{% block content %}
<section class="auth-card">
    <p class="eyebrow">Welcome Back</p>
    <h1>Log in to your medication dashboard.</h1>
    <form class="stack" data-auth-form="login">
        <label>
            Username
            <input type="text" name="username" placeholder="student1" required>
        </label>
        <label>
            Password
            <input type="password" name="password" placeholder="password123" required>
        </label>
        <button class="button primary" type="submit">Log In</button>
        <p class="form-message" data-form-message></p>
    </form>
</section>
{% endblock %}
