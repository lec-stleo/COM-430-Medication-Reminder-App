{% extends "base.html" %}

{% block title %}Register | Medication Reminder System V2{% endblock %}
{% block page_id %}register{% endblock %}

{% block content %}
<section class="auth-card">
    <p class="eyebrow">Create Account</p>
    <h1>Register for medication tracking.</h1>
    <form class="stack" data-auth-form="register">
        <label>
            Username
            <input type="text" name="username" placeholder="student1" required>
        </label>
        <label>
            Email
            <input type="email" name="email" placeholder="student1@example.com" required>
        </label>
        <label>
            Password
            <input type="password" name="password" placeholder="password123" required>
        </label>
        <button class="button primary" type="submit">Register</button>
        <p class="form-message" data-form-message></p>
    </form>
</section>
{% endblock %}
